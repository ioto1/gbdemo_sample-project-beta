# Project Beta — CI Pipeline
#
# Runs ROS simulation tests on PRs and main pushes.
# Triggers doc-to-gitbook conversion when docs/ change on main.

name: CI

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - docs/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/workflows/ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/franka/simulation/project-beta:latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      SIM_HEADLESS: "true"
      SIM_ROBOT_MODEL: "panda"
    steps:
      - uses: actions/checkout@v4
      - name: Source ROS and run tests
        run: |
          source /opt/ros/humble/setup.bash
          cd /workspace
          pip install pytest
          pytest tests/ --junitxml=report.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-beta
          path: /workspace/report.xml

  docs:
    needs: test
    if: github.ref == 'refs/heads/main'
    uses: ioto1/gbdemo_doc-converter/.github/workflows/docs-conversion.yml@main
    with:
      project-name: beta
      source-dir: docs/
    secrets:
      deploy-key: ${{ secrets.GITBOOK_DEPLOY_KEY }}
