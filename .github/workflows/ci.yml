# Project Beta — CI Pipeline
# Docs conversion is handled by docs.yml.

name: CI
on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/workflows/ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/franka/simulation/project-beta:latest
    env:
      SIM_HEADLESS: "true"
      SIM_ROBOT_MODEL: "panda"
    steps:
      - uses: actions/checkout@v4
      - name: Source ROS and run tests
        run: |
          source /opt/ros/humble/setup.bash
          cd /workspace
          pip install pytest
          pytest tests/ --junitxml=report.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-beta
          path: /workspace/report.xml
