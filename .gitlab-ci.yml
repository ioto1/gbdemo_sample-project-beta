# Project Beta — CI Pipeline

include:
  - project: 'franka-dev/devportal/doc-converter'
    ref: main
    file: 'ci-templates/docs-pipeline.yml'

stages:
  - test
  - docs

variables:
  DOC_PROJECT_NAME: "beta"
  DOC_SOURCE_DIR: "docs/"

# ── Simulation tests ──────────────────────────────────────────────────────────

sim-test:
  stage: test
  image: registry.franka.de/simulation/project-beta:latest
  variables:
    SIM_HEADLESS: "true"
    SIM_ROBOT_MODEL: "panda"
  script:
    - source /opt/ros/humble/setup.bash
    - cd /workspace
    - pytest tests/ --junitxml=report.xml
  artifacts:
    reports:
      junit: report.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Docs pipeline ─────────────────────────────────────────────────────────────

convert-docs:
  extends: .docs-conversion
  variables:
    DOC_PROJECT_NAME: "beta"
    DOC_SOURCE_DIR: "docs/"
